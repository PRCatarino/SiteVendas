services:
  postgres:
    image: postgres:16
    container_name: catarino-prime-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: catarino_prime
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - catarino_prime_pgdata:/var/lib/postgresql/data

volumes:
  catarino_prime_pgdata:
